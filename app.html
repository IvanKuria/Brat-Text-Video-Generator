<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>brat video tool</title>
<style>
  @font-face{ font-family:"ArialNarrow"; src:url("./fonts/ArialNarrowBold.ttf") format("truetype"); font-weight:700; }
  :root{ --ink:#000; --line:#e2e2e2; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#fff; color:var(--ink); font-family:"ArialNarrow",Arial,sans-serif;
        display:grid; grid-template-columns:1fr 1fr; min-height:100vh; }
  .panel{ padding:32px 36px; }
  .panel.left{ border-right:1px solid var(--line); max-width:560px; }
  h1{ font-size:54px; text-transform:lowercase; margin:0 0 4px; letter-spacing:-1px; }
  .sub{ color:#888; margin:0 0 28px; font-size:18px; }
  .step{ margin:0 0 26px; }
  .step h2{ font-size:22px; text-transform:lowercase; margin:0 0 10px; }
  label.r{ display:inline-flex; align-items:center; gap:6px; margin-right:18px; font-size:20px; cursor:pointer; }
  input[type=file]{ font-size:16px; }
  button{ font-family:inherit; font-size:20px; text-transform:lowercase; background:#000; color:#fff;
          border:0; padding:10px 18px; cursor:pointer; }
  button:disabled{ background:#bbb; cursor:default; }
  button.ghost{ background:#fff; color:#000; border:2px solid #000; }
  .row{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  #log{ white-space:pre-wrap; background:#0b0b0b; color:#d6ffb0; font-family:ui-monospace,Menlo,monospace;
        font-size:12px; padding:12px; height:150px; overflow:auto; margin-top:14px; }
  #dl{ display:none; margin-top:12px; font-size:22px; }
  .panel.right{ display:flex; flex-direction:column; }
  .frame{ flex:1; border:1px solid var(--line); background:#fafafa; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  iframe{ border:0; background:#fff; }
  .hint{ color:#999; font-size:14px; margin-top:8px; }
</style>
</head>
<body>
  <div class="panel left">
    <h1>brat video tool</h1>
    <p class="sub">audio in → brat-style mp4 out</p>

    <div class="step">
      <h2>1 · audio + transcribe</h2>
      <div class="row">
        <input id="file" type="file" accept="audio/*" />
        <button id="btnTranscribe">transcribe</button>
      </div>
      <p class="hint">pick an audio file (or reuse the one already loaded), then transcribe.</p>
    </div>

    <div class="step">
      <h2>2 · format</h2>
      <div class="row">
        <label class="r"><input type="radio" name="aspect" value="9x16" checked /> 9:16 (tiktok)</label>
        <label class="r"><input type="radio" name="aspect" value="16x9" /> 16:9 (youtube)</label>
        <button id="btnPreview" class="ghost">preview ▸</button>
      </div>
      <p class="hint">preview opens on the right — click it and press <b>space</b> to play.</p>
    </div>

    <div class="step">
      <h2>3 · generate</h2>
      <div class="row">
        <button id="btnGenerate">generate mp4</button>
        <label class="r"><input id="quick" type="checkbox" /> quick 20s test</label>
      </div>
      <a id="dl" href="/download" download>⬇ download out.mp4</a>
    </div>

    <div id="log">ready.</div>
  </div>

  <div class="panel right">
    <h2 style="text-transform:lowercase;font-size:22px;margin:0 0 12px">preview</h2>
    <div class="frame"><iframe id="preview" title="preview"></iframe></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
function put(t, reset){ if(reset) log.textContent=""; log.textContent += t; log.scrollTop = log.scrollHeight; }
function aspect(){ return document.querySelector('input[name=aspect]:checked').value; }
function setBusy(b){ for(const id of ["btnTranscribe","btnPreview","btnGenerate"]) $(id).disabled=b; }

async function stream(resp){
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let all = "";
  for(;;){
    const { value, done } = await reader.read();
    if(done) break;
    const chunk = dec.decode(value, { stream:true });
    all += chunk; put(chunk);
  }
  return all;
}

$("btnTranscribe").onclick = async () => {
  setBusy(true); $("dl").style.display="none";
  try{
    const f = $("file").files[0];
    if(f){ put(`uploading ${f.name} (${(f.size/1e6).toFixed(1)} MB)...\n`, true);
      const u = await fetch("/upload", { method:"POST", body:f });
      put(await u.text()===""?"":""); put("uploaded.\n");
    } else { put("no new file selected — using existing narration.m4a\n", true); }
    put("transcribing (whisper medium.en — this can take a while)...\n");
    await stream(await fetch("/transcribe", { method:"POST" }));
    fitPreview(); refreshPreview();
  } catch(e){ put("\nerror: "+e.message+"\n"); }
  setBusy(false);
};

function fitPreview(){
  const D = aspect()==="16x9" ? {w:1920,h:1080} : {w:1080,h:1920};
  const box = document.querySelector(".frame").getBoundingClientRect();
  const s = Math.min((box.width-2)/D.w, (box.height-2)/D.h);
  const f = $("preview");
  f.width = D.w; f.height = D.h;
  f.style.transform = `scale(${s})`; f.style.transformOrigin = "center";
}
function refreshPreview(){
  $("preview").src = `/reader?aspect=${aspect()}&_=${Math.floor(performance.now())}`;
}
$("btnPreview").onclick = () => { fitPreview(); refreshPreview(); };
addEventListener("resize", fitPreview);
document.querySelectorAll('input[name=aspect]').forEach(r => r.onchange = () => { fitPreview(); refreshPreview(); });

$("btnGenerate").onclick = async () => {
  setBusy(true); $("dl").style.display="none";
  try{
    const q = $("quick").checked ? "&sec=20" : "";
    put(`generating ${aspect()} mp4${$("quick").checked?" (20s test)":""}...\n`, true);
    const out = await stream(await fetch(`/generate?aspect=${aspect()}${q}`, { method:"POST" }));
    if(out.includes("DONE /download")){
      const dl = $("dl"); dl.href = `/download?_=${Math.floor(performance.now())}`; dl.style.display="inline-block";
      put("\nmp4 ready — download below.\n");
    }
  } catch(e){ put("\nerror: "+e.message+"\n"); }
  setBusy(false);
};

// initial preview if captions already exist
fitPreview(); refreshPreview();
</script>
</body>
</html>
