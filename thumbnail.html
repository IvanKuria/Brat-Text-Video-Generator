<!doctype html>
<html><head><meta charset="utf-8" />
<style>
  @font-face{
    font-family:"ArialNarrow";
    src:url("./fonts/ArialNarrowRegular.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:block;
  }
  :root{ --bg:#ffffff; --ink:#000000; }
  html,body{margin:0;height:100%;background:var(--bg)}
  /* exact clone of the reader frame — brat white, 9:16 */
  #t{position:absolute;top:50%;left:50%;width:1080px;height:1920px;transform:translate(-50%,-50%);overflow:hidden;background:var(--bg)}
  #page{position:absolute;left:60px;right:60px;top:50%;transform:translateY(-50%) scaleX(1.08);
    font-family:"ArialNarrow",Arial,sans-serif;font-weight:400;text-transform:lowercase;text-align:center;
    font-size:190px;line-height:0.98;letter-spacing:0;color:var(--ink);filter:blur(2px)}
</style></head>
<body>
<div id="t">
  <div id="page">being a woman<br>doesn't make you<br>a feminist expert.<br>period.</div>
</div>
</body></html>
